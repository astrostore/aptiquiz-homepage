<!DOCTYPE html>
<html>
<head>
    <title>AptiQuiz - Exam Preparation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-4xl mx-auto px-4 py-16">
        <h1 class="text-4xl font-bold text-center text-blue-800 mb-4">AptiQuiz</h1>
        <p class="text-center text-gray-600 mb-8">AI-Powered Exam Preparation</p>
        
        <form action="https://formspree.io/f/xaqvzaej" method="POST" class="bg-white p-6 rounded-lg shadow-md max-w-md mx-auto">
            <h2 class="text-xl font-bold mb-4">Start Free Trial</h2>
            <input type="email" name="email" placeholder="Your email address" required class="w-full p-2 border rounded mb-3">
            <input type="text" name="exam" placeholder="Which exam?" class="w-full p-2 border rounded mb-3">
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Send Request →</button>
        </form>
    </div>
</body>
</html>
