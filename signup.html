<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up for AptiQuiz - Practice & Improve</title>
    <!-- Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .form-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        .required {
            color: #e74c3c;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .help-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        .cf-turnstile {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .footer {
            text-align: center;
            padding: 20px 30px;
            background: #f8f9fa;
            font-size: 12px;
            color: #888;
            border-top: 1px solid #eee;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🚀 AptiQuiz</h1>
                <p>Master aptitude tests with daily practice</p>
            </div>
            <div class="form-body">
                <div id="alert" class="alert"></div>
                
                <form id="signupForm" action="https://d1e90852.sibforms.com/serve/MUIFAK7xAsRg6UUAnQdqoCV6PYpZSGWeEPTndkV5o_L2Mj5kJU5yT7FkO92fvpabF4Ls6tjTAhpj2FOMOkIDdEH0pEaWT-DlOJcBvn2aMwUjZNCLrtSrEs0Y7j48r81xk68n_jhQEtKBRvze_ireQKpdwVr5wlo_CF-5giBYOUfp_nS78p2OYlvK8e48Li3MXIXYSRNbH-jyk0hn8w==" method="POST">
                    <div class="form-group">
                        <label>First Name <span class="required">*</span></label>
                        <input type="text" name="FIRSTNAME" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="LASTNAME">
                    </div>
                    <div class="form-group">
                        <label>Email Address <span class="required">*</span></label>
                        <input type="email" name="EMAIL" required>
                        <div class="help-text">We'll send practice questions and updates</div>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number</label>
                        <input type="tel" name="MOBILE" placeholder="+91 XXXXXXXXXX">
                        <div class="help-text">Optional for India — SMS reminders for practice</div>
                    </div>
                    <div class="form-group">
                        <label>Country</label>
                        <select name="COUNTRY">
                            <option value="India">India</option>
                            <option value="United States">United States</option>
                            <option value="United Kingdom">United Kingdom</option>
                            <option value="Canada">Canada</option>
                            <option value="Australia">Australia</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <!-- Manual Cloudflare Turnstile -->
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAAADRI97A01AATCSf1" data-theme="light"></div>

                    <button type="submit" id="submitBtn">Subscribe Now →</button>
                </form>
            </div>
            <div class="footer">
                <p>No spam. Unsubscribe anytime. <a href="/privacy">Privacy Policy</a></p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        const submitBtn = document.getElementById('submitBtn');
        const alertDiv = document.getElementById('alert');

        form.addEventListener('submit', function(e) {
            // Check if Turnstile is completed
            const turnstileResponse = document.querySelector('[name="cf-turnstile-response"]');
            if (!turnstileResponse || !turnstileResponse.value) {
                e.preventDefault();
                showAlert('Please complete the security check (CAPTCHA).', 'error');
                return;
            }
            
            // Disable button to prevent double submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            
            // Form will submit normally to Brevo
            // Brevo will redirect to thank-you page after confirmation
        });

        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }

        // Reset button if form submission fails
        window.addEventListener('load', function() {
            if (window.location.search.includes('error')) {
                showAlert('Submission failed. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Subscribe Now →';
            }
        });
    </script>
</body>
</html>
